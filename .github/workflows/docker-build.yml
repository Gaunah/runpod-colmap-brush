name: Build and Push Docker Image to Docker Hub

on:
  workflow_dispatch: 
    inputs:
      version_tag:
        description: 'Image version tag (e.g., 1.0, 1.1)'
        required: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/colmap-brush-runpod:${{ github.event.inputs.version_tag }}
            ${{ secrets.DOCKERHUB_USERNAME }}/colmap-brush-runpod:latest
          # Keep the caching to save build time
          cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/colmap-brush-runpod:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/colmap-brush-runpod:buildcache,mode=max
